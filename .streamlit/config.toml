"""
Streamlit Configuration for ClamFlow Cloud Deployment
====================================================

Production-ready Streamlit configuration for cloud deployment.
Optimized for mobile-first onboarding and enterprise performance.
"""

[global]
# Development vs Production
developmentMode = false
showErrorDetails = false
suppressDeprecationWarnings = true

# Performance Optimization
maxUploadSize = 10
enableCORS = false

# UI Configuration
hideSidebarNav = false
showToolbar = false

# Theme Configuration
[theme]
primaryColor = "#FF6B35"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

# Server Configuration
[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10
port = 8501

# Browser Configuration
[browser]
serverAddress = "localhost"
gatherUsageStats = false
serverPort = 8501

# Logger Configuration
[logger]
level = "info"
messageFormat = "%(asctime)s %(message)s"

# Client Configuration
[client]
caching = true
displayEnabled = true
showErrorDetails = false

# Mapbox Configuration (if needed for location features)
[mapbox]
token = ""

# Deprecated - keeping for compatibility
[deprecation]
showfileUploaderEncoding = false
showPyplotGlobalUse = false
